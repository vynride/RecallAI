version: "3.9"

services:
  backend:
    deploy:
      resources:
        limits:
          memory: 1G
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  worker:
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  frontend:
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  postgres:
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  redis:
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  umami:
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
