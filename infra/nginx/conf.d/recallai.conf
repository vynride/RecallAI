# RecallAI vhost. Run certbot once with the http-01 challenge to seed
# /etc/letsencrypt/live/${DOMAIN}/. See README for the bootstrap command.

# Plaintext: ACME challenge + redirect everything else.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# TLS vhost.
server {
    listen 443 ssl http2;
    server_name _;

    # Replace these paths with /etc/letsencrypt/live/${DOMAIN}/... once issued.
    ssl_certificate     /etc/letsencrypt/live/recallai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recallai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── App routes (Next.js, signin, dashboard, /api/auth/*, /api/proxy/*) ──
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Stream-friendly defaults for SSE / Next data fetches passing through
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # NextAuth callbacks live under /api/auth — apply the auth zone there.
    location /api/auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Direct backend (rare; the frontend proxies most API calls) ──
    location ^~ /api/ {
        limit_req zone=api burst=60 nodelay;

        # Tighter cap for upload endpoint
        location = /api/jobs {
            limit_req zone=upload burst=5 nodelay;
            client_max_body_size 60m;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # SSE endpoint: disable buffering, long timeout
        location ~ ^/api/jobs/[^/]+/stream$ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
            chunked_transfer_encoding off;
        }

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Umami (kept on the same domain at /umami) ──
    location /umami/ {
        proxy_pass http://umami:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
